<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>DOCX → QST Конвертер</title>
</head>

<body style="font-family:Arial;padding:20px">

<h2>📄 DOCX → QST конвертер</h2>

<input type="file" id="file" accept=".docx">
<button onclick="convert()">Конвертировать</button>

<p id="status"></p>

<script src="https://unpkg.com/mammoth/mammoth.browser.min.js"></script>

<script>

function convert() {

    const file = document.getElementById('file').files[0];
    if (!file) {
        alert("Выбери DOCX файл");
        return;
    }

    document.getElementById('status').innerText = "Конвертация...";

    const reader = new FileReader();

    reader.onload = async function(e) {

        const arrayBuffer = e.target.result;

        const result = await mammoth.extractRawText({ arrayBuffer });

        let text = result.value;

        // 🔥 нормализуем текст
        text = text.replace(/\r/g, '');

        const blocks = text
            .split('<question>')
            .map(q => q.trim())
            .filter(q => q.length > 0);

        let output = "";

        blocks.forEach(block => {

            const lines = block.split('\n').map(l => l.trim()).filter(l => l);

            let question = "";
            let variants = [];
            let image = "";

            lines.forEach(line => {

                if (line.startsWith('<variant>')) {
                    variants.push(line.replace('<variant>', '').trim());
                }
                else if (line.startsWith('<img>')) {
                    image = line.replace('<img>', '').trim();
                }
                else {
                    question += line + " ";
                }

            });

            if (!question || variants.length === 0) return;

            output += "<question>\n";
            output += question.trim() + "\n";

            if (image) {
                output += "<img>" + image + "\n";
            }

            // 🔥 ВАЖНО: первый вариант = правильный
            variants.forEach(v => {
                output += "<variant>" + v + "\n";
            });

            output += "\n";

        });

        downloadFile(output, "test.qst");

        document.getElementById('status').innerText = "Готово ✅ файл test.qst скачан";
    };

    reader.readAsArrayBuffer(file);
}

function downloadFile(content, filename) {
    const blob = new Blob([content], { type: "text/plain" });
    const link = document.createElement("a");
    link.href = URL.createObjectURL(blob);
    link.download = filename;
    link.click();
}

</script>

</body>
</html>
